version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: prosumer
      MYSQL_USER: teste
      MYSQL_PASSWORD: testeteste
    ports:
      - "3306:3306"
    volumes:
      - prosumer-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prosumer-network

  prosumer:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_REACTIVE_URL: mysql://mysql:3306/prosumer
      QUARKUS_DATASOURCE_USERNAME: teste
      QUARKUS_DATASOURCE_PASSWORD: testeteste
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - prosumer-network

volumes:
  prosumer-db:

networks:
  prosumer-network:
    driver: bridge
