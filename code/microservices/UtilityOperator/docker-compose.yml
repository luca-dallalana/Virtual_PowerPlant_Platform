version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: utilityoperator
      MYSQL_USER: teste
      MYSQL_PASSWORD: testeteste
    ports:
      - "3307:3306"
    volumes:
      - utilityoperator-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - utilityoperator-network

  utilityoperator:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    ports:
      - "8081:8081"
    environment:
      QUARKUS_DATASOURCE_REACTIVE_URL: mysql://mysql:3306/utilityoperator
      QUARKUS_DATASOURCE_USERNAME: teste
      QUARKUS_DATASOURCE_PASSWORD: testeteste
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - utilityoperator-network
      - vpp-network

volumes:
  utilityoperator-db:

networks:
  utilityoperator-network:
    driver: bridge
  vpp-network:
    external: true
