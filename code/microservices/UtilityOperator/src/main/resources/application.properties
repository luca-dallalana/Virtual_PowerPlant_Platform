# Kafka Configuration
kafka.bootstrap.servers=localhost:9092

# GridCell Events - Unified Topic
mp.messaging.outgoing.gridcell-events.connector=smallrye-kafka
mp.messaging.outgoing.gridcell-events.topic=GridCell-Events
mp.messaging.outgoing.gridcell-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer
