# Database Configuration
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=teste
quarkus.datasource.password=testeteste
quarkus.datasource.reactive.url=mysql://localhost:3306/gridbalancingrecommendation

# Schema Creation
myapp.schema.create=true

# Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# HTTP Configuration
quarkus.http.port=8084

# Kafka Configuration
kafka.bootstrap.servers=localhost:9092
mp.messaging.outgoing.grid-balancing-recommendation.connector=smallrye-kafka
mp.messaging.outgoing.grid-balancing-recommendation.topic=GridBalancingRecommendation
mp.messaging.outgoing.grid-balancing-recommendation.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Recommendation threshold (e.g., 0.9 = 90% of max capacity)
gridbalancing.threshold.percent=0.9
