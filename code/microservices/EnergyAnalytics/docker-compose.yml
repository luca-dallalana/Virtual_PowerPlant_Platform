version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: energyanalytics
      MYSQL_USER: teste
      MYSQL_PASSWORD: testeteste
    ports:
      - "3313:3306"
    volumes:
      - energyanalytics-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energyanalytics-network

  energyanalytics:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    ports:
      - "8086:8086"
    environment:
      QUARKUS_DATASOURCE_REACTIVE_URL: mysql://mysql:3306/energyanalytics
      QUARKUS_DATASOURCE_USERNAME: teste
      QUARKUS_DATASOURCE_PASSWORD: testeteste
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092,kafka2:9092,kafka3:9092
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - energyanalytics-network
      - vpp-network

volumes:
  energyanalytics-db:

networks:
  energyanalytics-network:
    driver: bridge
  vpp-network:
    external: true
