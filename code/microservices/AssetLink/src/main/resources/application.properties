quarkus.http.port=8082

quarkus.datasource.db-kind=mysql
quarkus.datasource.username=teste
quarkus.datasource.password=testeteste
quarkus.datasource.reactive.url=mysql://localhost:3306/assetlink

quarkus.swagger-ui.path=swagger-ui
quarkus.swagger-ui.always-include=true

quarkus.container-image.build=true
quarkus.container-image.push=true

# Kafka Configuration
kafka.bootstrap.servers=localhost:9092

# AssetLink Events - Unified Topic
mp.messaging.outgoing.assetlink-events.connector=smallrye-kafka
mp.messaging.outgoing.assetlink-events.topic=AssetLink-Events
mp.messaging.outgoing.assetlink-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer
