# HTTP
quarkus.http.port=8086

# Database (default for FlexibilityForecasting own tables)
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=teste
quarkus.datasource.password=testeteste
quarkus.datasource.reactive.url=mysql://localhost:3306/flexibilityforecasting
myapp.schema.create=true

# FlexibilityEvent Database
quarkus.datasource.flexibilityevent.db-kind=mysql
quarkus.datasource.flexibilityevent.username=teste
quarkus.datasource.flexibilityevent.password=testeteste
quarkus.datasource.flexibilityevent.reactive.url=mysql://localhost:3306/flexibilityevent

# GridBalancing Database
quarkus.datasource.gridbalancing.db-kind=mysql
quarkus.datasource.gridbalancing.username=teste
quarkus.datasource.gridbalancing.password=testeteste
quarkus.datasource.gridbalancing.reactive.url=mysql://localhost:3306/gridbalancingrecommendation

# Swagger
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# REST Client for Ollama only
quarkus.rest-client.ollama-api.url=http://localhost:11434
quarkus.rest-client.ollama-api.scope=jakarta.inject.Singleton
quarkus.rest-client.ollama-api.read-timeout=60000
quarkus.rest-client.ollama-api.connect-timeout=5000

# Ollama Configuration
ollama.model=llama3.2:latest
ollama.temperature=0.7
ollama.max-tokens=1000

# Forecast Configuration
forecast.max-events=200
forecast.correlation-window-minutes=30
